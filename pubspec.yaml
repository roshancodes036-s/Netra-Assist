name: myapp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # Fonts & State Management
  google_fonts: ^7.0.2
  provider: ^6.1.2

  # 🌐 Network & AI
  http: ^1.2.0
  google_generative_ai: ^0.4.7

  # 🔥 Firebase (STABLE – SDK 34 compatible)
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1

  # 🎤 Voice, Files & Camera
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0  # Stable version for compatibility
  file_picker: ^10.3.8
  permission_handler: ^12.0.1
  image_picker: ^1.0.7
  
  # ✅ ZIP Support (Repo Chat ke liye zaroori)
  archive: ^4.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/orb.gif