name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # यह है नया फिक्स (New Fix)
      # हम GitHub के कंप्यूटर में मौजूद Gradle का यूज़ करके फाइल बनाएंगे
      - name: Generate Missing Gradle Wrapper
        run: |
          cd android
          gradle wrapper
          chmod +x gradlew

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codenetra-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
